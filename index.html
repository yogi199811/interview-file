<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="width: 500px;  height: 100px ; border: 2px solid black;" id="div1">
        div1
        <div style=" margin: 5px; width: 400px; height: 50px ; border: 2px solid black;" id="div2">
            div2
            <div style="margin: 5px; width: 200px; height: 20px ; border: 1px solid black;" id="div3">
                    div3
            </div>

        </div>
    </div>
    
</body>
<script>
    document.getElementById("div3").addEventListener("click",function(e){
        e.stopPropagation()
        this.style.background = "red"
        console.log("div3");

        

    }) 
    
    document.getElementById("div2").addEventListener("click",function(){
        this.style.background = "blue"
        console.log("div2");
        

    },) 
    document.getElementById("div1").addEventListener("click",function(){
        this.style.background = "yellow"
        console.log("div1");
        

    },) 
</script>
